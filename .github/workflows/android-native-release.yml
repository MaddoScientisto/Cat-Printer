name: Android Native APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-native-v*'
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: android-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Resolve release tag
        id: release_meta
        run: |
          git fetch --force --tags

          if [[ "$GITHUB_REF_TYPE" == 'tag' ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            latest_version_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"

            if [[ -z "$latest_version_tag" ]]; then
              echo "No v* tags were found. Manual release requires at least one version tag." >&2
              exit 1
            fi

            release_tag="android-native-$latest_version_tag"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Decode optional signing key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/catprinter-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/catprinter-signing/release.jks"
          echo "CATPRINTER_KEYSTORE_FILE=$RUNNER_TEMP/catprinter-signing/release.jks" >> "$GITHUB_ENV"

      - name: Export optional signing secrets
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "CATPRINTER_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "CATPRINTER_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "CATPRINTER_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Verify release APK signature
        run: |
          apksigner_bin="$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"

          if [[ -z "$apksigner_bin" ]]; then
            echo "Could not find apksigner under the Android SDK build-tools directory." >&2
            exit 1
          fi

          "$apksigner_bin" verify --verbose build/native-app/outputs/apk/release/app-release.apk

      - name: Name release APK
        run: |
          mkdir -p ../release-artifacts
          cp build/native-app/outputs/apk/release/app-release.apk ../release-artifacts/cat-printer-native-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cat-printer-native-release-apk
          path: release-artifacts/cat-printer-native-release.apk

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: release-artifacts/cat-printer-native-release.apk
          generate_release_notes: true
          overwrite_files: true
