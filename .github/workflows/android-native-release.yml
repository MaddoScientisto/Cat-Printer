name: Android Native APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-native-v*'
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: android-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode optional signing key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/catprinter-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/catprinter-signing/release.jks"
          echo "CATPRINTER_KEYSTORE_FILE=$RUNNER_TEMP/catprinter-signing/release.jks" >> "$GITHUB_ENV"

      - name: Export optional signing secrets
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "CATPRINTER_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "CATPRINTER_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "CATPRINTER_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Name release APK
        run: |
          mkdir -p ../release-artifacts
          cp build/native-app/outputs/apk/release/*.apk ../release-artifacts/cat-printer-native-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cat-printer-native-release-apk
          path: release-artifacts/cat-printer-native-release.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/cat-printer-native-release.apk
          generate_release_notes: true
